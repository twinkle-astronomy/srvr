services:
  srvr:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    init: true
    volumes:
      - bash-history:/home/dev/.bash_history_dir
      - .:/app
    ports:
      - "8080:8080"
      - "443:443"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - DATABASE_URL=sqlite:///app/.data/data.db
      - TZ=America/Los_Angeles
    command:
      "sleep infinity"
  srvr-published:
    profiles: ["published"]
    sysctls:
      net.ipv4.tcp_keepalive_time: 60
      net.ipv4.tcp_keepalive_intvl: 10
      net.ipv4.tcp_keepalive_probes: 6
    image: ghcr.io/twinkle-astronomy/srvr:0.1.8
    build:
      context: .
      dockerfile: Dockerfile
      target: publish
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - srvr-data:/data
      # - ./certs:/certs:ro  # Mount certificate directory for manual TLS
    init: true
    ports:
      - "80:8080"
      - "443:443"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - DATABASE_URL=sqlite:///data/data.db
      - TZ=America/Los_Angeles
      ## Manual TLS — provide cert and key files:
      # - TLS_CERT_PATH=/certs/fullchain.pem
      # - TLS_KEY_PATH=/certs/privkey.pem
      ## ACME / Let's Encrypt — automatic certificate management:
      # - ACME_DOMAIN=example.com
      # - ACME_EMAIL=admin@example.com
      # - ACME_CACHE_DIR=/data/acme
      # - ACME_STAGING=true
      ## Shared TLS settings:
      # - HTTPS_PORT=443

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--enable-feature=promql-experimental-functions"

volumes:
  bash-history:
  prometheus-data:
  srvr-data:
